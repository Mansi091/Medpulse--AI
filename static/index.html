<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical RAG Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 h-screen w-screen overflow-hidden flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-2xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [files, setFiles] = useState([]);
            const [uploading, setUploading] = useState(false);
            const [uploadedFilenames, setUploadedFilenames] = useState([]);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [loadingAnswer, setLoadingAnswer] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                if (messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages]);

            const handleFileChange = (e) => {
                if (e.target.files) {
                    const newFiles = Array.from(e.target.files);
                    setFiles(prev => {
                        const existingNames = prev.map(f => f.name);
                        const uniqueNewFiles = newFiles.filter(f => !existingNames.includes(f.name));
                        return [...prev, ...uniqueNewFiles];
                    });
                }
            };

            const handleUpload = async () => {
                if (files.length === 0) return;
                setUploading(true);
                const formData = new FormData();
                files.forEach(f => {
                    formData.append("files", f);
                });

                try {
                    const res = await fetch("/upload", {
                        method: "POST",
                        body: formData
                    });
                    if (res.ok) {
                        const data = await res.json();
                        setUploadedFilenames(data.filenames);
                        setMessages([]);
                    } else {
                        alert("Upload failed");
                    }
                } catch (err) {
                    alert("An error occurred during upload");
                } finally {
                    setUploading(false);
                }
            };

            const formatChatHistory = (msgs) => {
                let formatted = "";
                msgs.forEach(msg => {
                    const role = msg.role === "user" ? "User" : "Assistant";
                    formatted += `${role}: ${msg.content}\n`;
                });
                return formatted;
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!input.trim() || uploadedFilenames.length === 0 || loadingAnswer) return;

                const userQuestion = input.trim();
                setInput("");
                
                const updatedMessages = [...messages, { role: "user", content: userQuestion }];
                setMessages(updatedMessages);
                setLoadingAnswer(true);

                const chatHistoryStr = formatChatHistory(messages);

                try {
                    const res = await fetch("/ask", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            question: userQuestion,
                            chat_history: chatHistoryStr
                        })
                    });
                    if (res.ok) {
                        setMessages(prev => [...prev, { role: "assistant", content: "" }]);
                        const reader = res.body.getReader();
                        const decoder = new TextDecoder("utf-8");
                        let done = false;
                        let textAccumulator = "";
                        
                        while (!done) {
                            const { value, done: readerDone } = await reader.read();
                            done = readerDone;
                            if (value) {
                                const chunk = decoder.decode(value, { stream: !done });
                                textAccumulator += chunk;
                                setMessages(prev => {
                                    const updated = [...prev];
                                    if (updated.length > 0) {
                                        updated[updated.length - 1].content = textAccumulator;
                                    }
                                    return updated;
                                });
                            }
                        }
                    } else {
                        setMessages(prev => [...prev, {
                            role: "assistant",
                            content: "Sorry, I could not process your request."
                        }]);
                    }
                } catch (err) {
                    setMessages(prev => [...prev, {
                        role: "assistant",
                        content: "An error occurred while fetching the response."
                    }]);
                } finally {
                    setLoadingAnswer(false);
                }
            };

            const handleReset = () => {
                setFiles([]);
                setUploadedFilenames([]);
                setMessages([]);
            };

            return (
                <div class="w-full flex flex-col space-y-4">
                    <div class="text-center space-y-1">
                        <h1 class="text-xl font-bold tracking-wider text-zinc-100 uppercase">MedPulse AI</h1>
                        <p class="text-[10px] uppercase font-bold tracking-widest text-emerald-500">Multimodal Document Intelligence Platform</p>
                    </div>

                    <div class="w-full h-[78vh] bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden flex flex-col shadow-2xl">
                        {uploadedFilenames.length === 0 ? (
                            <div class="flex-1 flex flex-col justify-center items-center p-8 space-y-6">
                                <div class="text-center space-y-2">
                                    <h1 class="text-lg font-bold tracking-tight text-zinc-100 uppercase">MedPulse AI</h1>
                                    <p class="text-xs text-zinc-400">Upload medical files (PDF or Images) to initialize your workspace</p>
                                </div>

                                <div class="w-full max-w-sm border-2 border-dashed border-zinc-800 hover:border-emerald-600/50 bg-zinc-950 hover:bg-emerald-950/5 rounded-xl p-6 transition-all flex flex-col items-center justify-center space-y-2 cursor-pointer relative group">
                                    <svg class="w-7 h-7 text-zinc-500 group-hover:text-emerald-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                    </svg>
                                    <span class="text-[11px] text-zinc-400 font-semibold">
                                        Add Files (PDF, PNG, JPG)
                                    </span>
                                    <input 
                                        type="file" 
                                        multiple
                                        accept=".pdf,.png,.jpg,.jpeg" 
                                        onChange={handleFileChange}
                                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                    />
                                </div>

                                {files.length > 0 && (
                                    <div class="w-full max-w-sm space-y-1.5">
                                        <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider">Selected Files</p>
                                        <div class="max-h-24 overflow-y-auto space-y-1 bg-zinc-950 border border-zinc-800 p-2 rounded-xl">
                                            {files.map((f, idx) => (
                                                <div key={idx} class="flex items-center justify-between text-[10px] text-zinc-400 bg-zinc-900/60 border border-zinc-800/40 px-2.5 py-1.5 rounded-lg">
                                                    <span class="truncate pr-2">{f.name}</span>
                                                    <button 
                                                        type="button" 
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            setFiles(prev => prev.filter((_, i) => i !== idx));
                                                        }}
                                                        class="text-zinc-500 hover:text-red-400 font-bold ml-2"
                                                    >
                                                        ✕
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <button 
                                    onClick={handleUpload}
                                    disabled={files.length === 0 || uploading}
                                    class="w-full max-w-sm bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-850 disabled:text-zinc-600 text-white font-semibold py-2.5 px-4 rounded-xl text-xs transition-colors shadow-lg shadow-emerald-950/20"
                                >
                                    {uploading ? "Analyzing Workspace Files..." : "Upload & Initialize"}
                                </button>
                            </div>
                        ) : (
                            <div class="flex-grow flex flex-col h-full overflow-hidden">
                                <header class="h-14 border-b border-zinc-800 flex items-center justify-between px-6 bg-zinc-900/90 backdrop-blur">
                                    <div class="flex items-center space-x-2 min-w-0 flex-1 mr-4">
                                        <div class="w-2 h-2 rounded-full bg-emerald-500 shrink-0"></div>
                                        <span class="text-xs font-semibold text-zinc-300 truncate">
                                            {uploadedFilenames.join(", ")}
                                        </span>
                                    </div>
                                    <button 
                                        onClick={handleReset}
                                        class="text-[10px] font-bold uppercase tracking-wider text-emerald-400 hover:text-emerald-300 transition-colors shrink-0"
                                    >
                                        Reset Workspace
                                    </button>
                                </header>

                                <div class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col bg-zinc-950">
                                    {messages.map((msg, i) => (
                                        <div 
                                            key={i} 
                                            class={`p-3.5 rounded-2xl text-xs leading-relaxed max-w-[85%] ${
                                                msg.role === "user" 
                                                    ? "bg-emerald-600 text-white self-end rounded-tr-none" 
                                                    : "bg-zinc-900 border border-zinc-800/80 text-zinc-200 self-start rounded-tl-none"
                                            }`}
                                        >
                                            {msg.content}
                                        </div>
                                    ))}
                                    {loadingAnswer && (
                                        <div class="flex items-center space-x-2 self-start bg-zinc-900 border border-zinc-800/85 p-3.5 rounded-2xl rounded-tl-none text-xs text-zinc-500">
                                            <div class="animate-pulse flex space-x-1">
                                                <div class="h-1.5 w-1.5 bg-zinc-650 rounded-full"></div>
                                                <div class="h-1.5 w-1.5 bg-zinc-650 rounded-full"></div>
                                                <div class="h-1.5 w-1.5 bg-zinc-650 rounded-full"></div>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>

                                <div class="p-4 border-t border-zinc-800 bg-zinc-900">
                                    <form onSubmit={handleSend} class="flex space-x-3">
                                        <input 
                                            type="text" 
                                            value={input}
                                            onChange={(e) => setInput(e.target.value)}
                                            placeholder="Ask a question about the active document..."
                                            disabled={loadingAnswer}
                                            class="flex-1 bg-zinc-950 border border-zinc-800 focus:border-emerald-600 rounded-xl py-2.5 px-4 text-xs text-zinc-100 placeholder-zinc-500 focus:outline-none focus:ring-1 focus:ring-emerald-600 transition-all"
                                        />
                                        <button 
                                            type="submit"
                                            disabled={!input.trim() || loadingAnswer}
                                            class="bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-950 disabled:text-zinc-600 text-white font-semibold text-xs px-5 rounded-xl transition-colors shrink-0"
                                        >
                                            Send
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
